<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whac-a-Mole</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #2d6a4f;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      color: #fff;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #1b4332;
      margin-bottom: 16px;
    }

    .hud {
      display: flex;
      gap: 48px;
      margin-bottom: 20px;
      background: rgba(0,0,0,0.25);
      padding: 10px 32px;
      border-radius: 40px;
    }

    .hud-item {
      text-align: center;
    }

    .hud-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .hud-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .hole {
      width: 120px;
      height: 120px;
      background: #1b4332;
      border-radius: 50%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 6px 14px rgba(0,0,0,0.5), 0 4px 0 #0d2b1f;
      cursor: default;
      position: relative;
    }

    .mole {
      width: 80px;
      height: 80px;
      border-radius: 50% 50% 40% 40%;
      background: #8b5e3c;
      position: absolute;
      bottom: -80px;
      cursor: pointer;
      transition: bottom 0.12s ease-out;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .mole::before {
      content: '';
      width: 50px;
      height: 30px;
      background: #f4a96a;
      border-radius: 50%;
      position: absolute;
      bottom: 14px;
    }

    /* eyes */
    .mole::after {
      content: '👀';
      font-size: 22px;
      position: absolute;
      top: 14px;
    }

    .mole.up {
      bottom: 8px;
    }

    .mole.whacked {
      bottom: 8px;
      background: #5a3e28;
      transform: scale(0.85);
      pointer-events: none;
    }

    #start-btn {
      padding: 14px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: #f4a261;
      color: #1b4332;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 4px 0 #c97d3a;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #c97d3a;
    }

    #start-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #c97d3a;
    }

    #start-btn:disabled {
      background: #aaa;
      box-shadow: 0 4px 0 #888;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 20px;
      font-size: 1.6rem;
      font-weight: 700;
      text-shadow: 2px 2px 0 #1b4332;
      min-height: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Whac-a-Mole!</h1>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="timer">30</div>
    </div>
  </div>

  <div id="grid"></div>

  <button id="start-btn">Start Game</button>
  <div id="result"></div>

  <script>
    const HOLE_COUNT = 9;
    const GAME_DURATION = 30;

    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');
    const resultEl = document.getElementById('result');

    let score = 0;
    let timeLeft = GAME_DURATION;
    let running = false;
    let moleTimeout = null;
    let countdownInterval = null;
    let activeMole = null;

    // Build the grid
    const holes = [];
    const moles = [];
    for (let i = 0; i < HOLE_COUNT; i++) {
      const hole = document.createElement('div');
      hole.className = 'hole';

      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.addEventListener('click', whack);

      hole.appendChild(mole);
      grid.appendChild(hole);
      holes.push(hole);
      moles.push(mole);
    }

    function randomIndex(exclude) {
      let idx;
      do { idx = Math.floor(Math.random() * HOLE_COUNT); } while (idx === exclude);
      return idx;
    }

    function peekMole() {
      if (!running) return;

      const idx = randomIndex(activeMole);
      activeMole = idx;
      const mole = moles[idx];
      mole.classList.add('up');

      const upDuration = 700 + Math.random() * 600;
      moleTimeout = setTimeout(() => {
        mole.classList.remove('up', 'whacked');
        activeMole = null;
        if (running) {
          const gap = 400 + Math.random() * 400;
          moleTimeout = setTimeout(peekMole, gap);
        }
      }, upDuration);
    }

    function whack(e) {
      if (!running) return;
      const mole = e.currentTarget;
      if (!mole.classList.contains('up') || mole.classList.contains('whacked')) return;

      mole.classList.add('whacked');
      score++;
      scoreEl.textContent = score;
    }

    function startGame() {
      score = 0;
      timeLeft = GAME_DURATION;
      scoreEl.textContent = '0';
      timerEl.textContent = GAME_DURATION;
      resultEl.textContent = '';
      running = true;
      startBtn.disabled = true;

      // Reset all moles
      moles.forEach(m => m.classList.remove('up', 'whacked'));
      activeMole = null;

      // Start spawning moles
      const gap = 300 + Math.random() * 300;
      moleTimeout = setTimeout(peekMole, gap);

      // Start countdown
      countdownInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      running = false;
      clearTimeout(moleTimeout);
      clearInterval(countdownInterval);

      moles.forEach(m => m.classList.remove('up', 'whacked'));
      activeMole = null;

      resultEl.textContent = `Game over! Final score: ${score} 🎉`;
      startBtn.disabled = false;
      startBtn.textContent = 'Play Again';
    }

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
